<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Visualizador de Matrices en 3D</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
</head>
<body>
  <div class="contenedor">
    <h1>Visualizador de Matrices</h1>
    <p>Ingresa los componentes (X, Y, Z) para agregar una nueva fila a la matriz.</p>
    
    <div class="controles">
      <input type="number" id="inputX" placeholder="Eje X">
      <input type="number" id="inputY" placeholder="Eje Y">
      <input type="number" id="inputZ" placeholder="Eje Z">
      <button id="btnPush">Agregar Fila (Push)</button>
      <button id="btnPop">Eliminar Fila (Pop)</button>
    </div>

    <div class="info-matriz">
      <h3>Estado de la Matriz en Memoria:</h3>
      <div id="contenedorMatriz" class="contenedor-matriz"></div>
    </div>

    <div id="grafico3d" style="width:100%; height:500px;"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
