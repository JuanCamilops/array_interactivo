<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualizador Dinámico de Arrays</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="contenedor">
    <h1>Visualizador de Arrays</h1>
    
    <div class="controles">
      <input type="text" id="inputValor" placeholder="Ingresa un valor (ej. 42, Hola)">
      <button id="btnPush">Agregar (Push)</button>
      <button id="btnPop">Eliminar último (Pop)</button>
    </div>

    <div id="contenedorArray" class="contenedor-array"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
